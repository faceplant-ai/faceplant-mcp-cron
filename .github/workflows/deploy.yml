name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "terraform/**"
      - "pyproject.toml"

env:
  AWS_REGION: us-west-2
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  SERVICE: mcp-cron

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Bootstrap & Init
        run: |
          REGION="us-west-2"
          BUCKET="faceplant-mcp-cron-tfstate"
          TABLE="faceplant-mcp-cron-tflock"

          aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
              --create-bucket-configuration LocationConstraint="$REGION" 2>/dev/null || true
          aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled 2>/dev/null || true

          aws dynamodb create-table --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST --region "$REGION" 2>/dev/null || true
          aws dynamodb wait table-exists --table-name "$TABLE" --region "$REGION"

          cd terraform && terraform init

      - name: Ensure ECR repository exists
        run: cd terraform && terraform apply -auto-approve -target=aws_ecr_repository.this

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push Docker image
        run: |
          ECR_URL=$(cd terraform && terraform output -raw ecr_url)
          docker build -f config/Dockerfile \
            -t $ECR_URL:${{ github.sha }} \
            -t $ECR_URL:latest .
          docker push $ECR_URL:${{ github.sha }}
          docker push $ECR_URL:latest

      - name: Terraform Apply
        run: |
          cd terraform && terraform apply -auto-approve \
            -var="slack_bot_token=$SLACK_BOT_TOKEN" \
            -var="notion_api_key=$NOTION_API_KEY" \
            -var="anthropic_api_key=$ANTHROPIC_API_KEY"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster faceplant \
            --service $SERVICE \
            --force-new-deployment \
            --region $AWS_REGION
