name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "pyproject.toml"
      - "k8s/**"

env:
  AWS_REGION: us-west-2
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  SERVICE: mcp-cron
  ECR_URL: 151765334007.dkr.ecr.us-west-2.amazonaws.com/faceplant-mcp-cron
  CHART: oci://151765334007.dkr.ecr.us-west-2.amazonaws.com/faceplant-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names faceplant-$SERVICE --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository --repository-name faceplant-$SERVICE --region $AWS_REGION --image-tag-mutability MUTABLE

      - name: Build and push Docker image
        run: |
          docker build -f config/Dockerfile \
            -t $ECR_URL:${{ github.sha }} \
            -t $ECR_URL:latest .
          docker push $ECR_URL:${{ github.sha }}
          docker push $ECR_URL:latest

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name faceplant --region $AWS_REGION

      - name: Deploy to EKS
        run: |
          helm upgrade --install $SERVICE $CHART \
            -n faceplant \
            -f k8s/values-prod.yaml \
            --set image=$ECR_URL:${{ github.sha }} \
            --set secrets.SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }} \
            --set secrets.NOTION_API_KEY=${{ secrets.NOTION_API_KEY }} \
            --set secrets.ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
            --set secrets.HUBSPOT_ACCESS_TOKEN=${{ secrets.HUBSPOT_ACCESS_TOKEN }}
